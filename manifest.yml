applications:
- path: .
  memory: 256M
  instances: 1
  domain: mybluemix.net
  name: kcuc-web
  host: kcuc-web
  disk_quota: 256M
  buildpack: sdk-for-nodejs
  routes:
    - route: kcuc-web.mybluemix.net/web
  env:
    DEBUG: 'false'
    API_PROTOCOL: https
    API_HOST: kcuc.mybluemix.net
    API_PORT: '443'
    CLIENT_PORT: '443'
